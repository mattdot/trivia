<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>__TITLE_PLAIN__</title>
<style>
  /* ============================================================
     TRIVIA FIELD GUIDE — self-contained, no external assets,
     no browser storage, NO JavaScript required to play. Each
     question is a native <details> tap target that reveals only
     its own answer, so the page works in any HTML viewer (incl.
     sandboxed/script-blocked ones like in-app previews). A small
     optional script adds a Reveal-all control + live counter when
     scripts are allowed; without it, per-question tapping still
     works fully and the control simply stays hidden.
     ============================================================ */

  :root{
    --paper:#f1efe6;
    --card:#fbfaf4;
    --ink:#2a2823;
    --ink-2:#574f43;
    --muted:#8c8475;
    --contour:#8a5a2b;     /* benchmark/contour bistre — the one bold hue */
    --olive:#5d6b4a;       /* used only for the "revealed" state */
    --line:rgba(42,40,35,.14);
    --line-soft:rgba(42,40,35,.08);
    --focus:#2f6db0;       /* survey water-blue, high contrast */

    --serif:"Iowan Old Style","Palatino Linotype",Palatino,Georgia,"Times New Roman",serif;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,system-ui,sans-serif;
    --mono:ui-monospace,"SF Mono",SFMono-Regular,Menlo,Consolas,"Roboto Mono",monospace;

    --maxw:640px;
    --pad:clamp(16px,5vw,28px);
    --radius:14px;
  }

  @media (prefers-color-scheme: dark){
    :root{
      --paper:#1b1a17;
      --card:#24231e;
      --ink:#ece7da;
      --ink-2:#bdb6a6;
      --muted:#8e8676;
      --contour:#cca067;
      --olive:#9bb07e;
      --line:rgba(236,231,218,.16);
      --line-soft:rgba(236,231,218,.08);
      --focus:#7cb3e8;
    }
  }

  *{box-sizing:border-box}
  html{-webkit-text-size-adjust:100%}
  body{
    margin:0;
    background:var(--paper);
    color:var(--ink);
    font-family:var(--sans);
    font-size:17px;
    line-height:1.55;
    -webkit-font-smoothing:antialiased;
    text-rendering:optimizeLegibility;
  }

  .wrap{
    max-width:var(--maxw);
    margin:0 auto;
    padding:0 var(--pad) calc(64px + env(safe-area-inset-bottom));
  }

  /* ---- Masthead ---- */
  header{
    padding:clamp(28px,8vw,52px) 0 18px;
    border-bottom:1px solid var(--line);
  }
  .eyebrow{
    font-family:var(--mono);
    font-size:.72rem;
    letter-spacing:.16em;
    text-transform:uppercase;
    color:var(--contour);
    margin:0 0 12px;
  }
  h1{
    font-family:var(--serif);
    font-weight:600;
    font-size:clamp(1.9rem,8vw,2.7rem);
    line-height:1.08;
    letter-spacing:-.01em;
    margin:0 0 .5rem;
  }
  h1 .num{color:var(--contour);font-style:italic}
  .dek{
    color:var(--ink-2);
    font-size:1.02rem;
    margin:.35rem 0 0;
    max-width:46ch;
  }

  /* ---- Control bar (sticky) — progressive enhancement only ----
     Hidden unless the optional script runs, so script-blocked
     viewers never show a dead button. */
  .controls{
    display:none;
    position:sticky;
    top:0;
    z-index:5;
    align-items:center;
    justify-content:space-between;
    gap:12px;
    padding:12px 0;
    margin:0 0 8px;
    background:color-mix(in srgb, var(--paper) 88%, transparent);
    backdrop-filter:saturate(1.2) blur(8px);
    border-bottom:1px solid var(--line-soft);
  }
  body.has-js .controls{display:flex}
  .count{
    font-family:var(--mono);
    font-size:.82rem;
    color:var(--muted);
    letter-spacing:.02em;
  }
  .count b{color:var(--ink);font-weight:600}
  .toggle-all{
    appearance:none;
    border:1px solid var(--line);
    background:var(--card);
    color:var(--ink);
    font:inherit;
    font-size:.86rem;
    font-weight:600;
    min-height:44px;
    padding:0 16px;
    border-radius:999px;
    cursor:pointer;
  }
  .toggle-all:active{transform:translateY(1px)}

  /* ---- Question cards (native <details>, no JS needed) ---- */
  .deck{margin:0;padding:8px 0 0}
  details.card{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:var(--radius);
    margin:0 0 14px;
    overflow:hidden;
    box-shadow:0 1px 0 var(--line-soft);
  }

  /* The whole question is the reveal control — a big, obvious tap target. */
  summary.q-toggle{
    list-style:none;
    -webkit-tap-highlight-color:transparent;
    display:grid;
    grid-template-columns:auto 1fr;
    gap:14px;
    align-items:start;
    text-align:left;
    padding:18px;
    cursor:pointer;
  }
  summary.q-toggle::-webkit-details-marker{display:none}
  summary.q-toggle::marker{content:""}

  /* Signature element: a survey benchmark medallion. */
  .medallion{
    position:relative;
    width:40px;height:40px;
    flex:none;
    border-radius:50%;
    border:1.5px solid var(--contour);
    display:grid;place-items:center;
    font-family:var(--mono);
    font-size:.95rem;
    font-weight:600;
    color:var(--contour);
    margin-top:2px;
  }
  .medallion::before,
  .medallion::after{
    content:"";position:absolute;background:var(--contour);opacity:.55;
  }
  .medallion::before{width:1px;height:6px;top:-4px;left:50%;transform:translateX(-50%)}
  .medallion::after{width:6px;height:1px;left:-4px;top:50%;transform:translateY(-50%)}

  .q-main{min-width:0}
  .cat{
    font-family:var(--mono);
    font-size:.68rem;
    letter-spacing:.12em;
    text-transform:uppercase;
    color:var(--muted);
    display:block;
    margin:2px 0 7px;
  }
  .q-text{
    font-family:var(--serif);
    font-size:1.14rem;
    line-height:1.42;
    color:var(--ink);
    display:block;
  }
  .hint{
    display:inline-flex;
    align-items:center;
    gap:7px;
    margin-top:12px;
    font-family:var(--mono);
    font-size:.74rem;
    letter-spacing:.04em;
    color:var(--contour);
  }
  .hint .lbl-open{display:none}
  details[open] .hint .lbl-closed{display:none}
  details[open] .hint .lbl-open{display:inline}
  details[open] .hint{color:var(--olive)}
  .chev{
    width:9px;height:9px;
    border-right:1.5px solid currentColor;
    border-bottom:1.5px solid currentColor;
    transform:rotate(45deg);
    transition:transform .25s ease;
  }
  details[open] .chev{transform:rotate(-135deg)}
  details[open] .medallion{background:var(--olive);border-color:var(--olive);color:var(--card)}
  details[open] .medallion::before,
  details[open] .medallion::after{background:var(--olive)}

  .answer-pad{
    padding:2px 18px 20px 18px;
    border-top:1px solid var(--line-soft);
    margin-top:2px;
  }
  @keyframes revealIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:none}}
  details[open] .answer-pad{animation:revealIn .25s ease}

  .label{
    font-family:var(--mono);
    font-size:.66rem;
    letter-spacing:.14em;
    text-transform:uppercase;
    color:var(--muted);
    display:block;
    margin:16px 0 5px;
  }
  .answer-pad .label:first-child{margin-top:14px}

  .ans-main{
    font-family:var(--serif);
    font-size:1.22rem;
    font-weight:600;
    line-height:1.3;
    color:var(--ink);
    display:block;
  }
  .ans-detail{
    display:block;
    margin-top:3px;
    color:var(--ink-2);
    font-size:1rem;
    line-height:1.5;
  }
  .field p{
    margin:0;
    color:var(--ink-2);
    font-size:1rem;
    line-height:1.6;
  }
  .field .source-text{
    font-size:.92rem;
    color:var(--muted);
    line-height:1.55;
  }

  /* Accessibility floor */
  summary.q-toggle:focus-visible,
  .toggle-all:focus-visible{
    outline:3px solid var(--focus);
    outline-offset:2px;
    border-radius:12px;
  }
  @media (prefers-reduced-motion: reduce){
    .chev{transition:none}
    details[open] .answer-pad{animation:none}
  }

  footer{
    margin-top:28px;
    padding-top:18px;
    border-top:1px solid var(--line);
    font-family:var(--mono);
    font-size:.74rem;
    letter-spacing:.02em;
    color:var(--muted);
    line-height:1.7;
  }
  footer a{color:var(--contour)}

  .empty{
    color:var(--muted);
    font-family:var(--mono);
    font-size:.85rem;
    padding:32px 0;
  }
</style>
</head>
<body>
  <div class="wrap">
    <header>
      <p class="eyebrow">__EYEBROW__</p>
      <h1>__TITLE_HTML__</h1>
      <p class="dek">__DEK__</p>
    </header>

    <div class="controls">
      <span class="count"><b id="revealed">0</b> of <span id="total">0</span> revealed</span>
      <button class="toggle-all" id="toggleAll" type="button">Reveal all</button>
    </div>

    <!-- The renderer replaces the marker below with one <details> card per
         question (server-rendered, fully escaped). No script needed to play. -->
    <div class="deck" id="deck">
<!--__CARDS__-->
    </div>

    <footer>__FOOTER_HTML__</footer>
  </div>

<script>
  /* Optional progressive enhancement: a Reveal-all/Hide-all control and a live
     "revealed N of M" counter. The cards already work without this — if the
     viewer blocks scripts, the control stays hidden and per-question tapping
     is unaffected. */
  (function(){
    var deck = document.getElementById('deck');
    if (!deck) return;
    var cards = Array.prototype.slice.call(deck.querySelectorAll('details.card'));
    if (!cards.length) return;
    document.body.classList.add('has-js');

    var revealedEl = document.getElementById('revealed');
    var totalEl = document.getElementById('total');
    var btn = document.getElementById('toggleAll');
    totalEl.textContent = cards.length;

    function update(){
      var open = cards.filter(function(c){ return c.open; }).length;
      revealedEl.textContent = open;
      btn.textContent = (open === cards.length) ? 'Hide all' : 'Reveal all';
    }
    cards.forEach(function(c){ c.addEventListener('toggle', update); });
    btn.addEventListener('click', function(){
      var allOpen = cards.every(function(c){ return c.open; });
      cards.forEach(function(c){ c.open = !allOpen; });
      update();
    });
    update();
  })();
</script>
</body>
</html>
