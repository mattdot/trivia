<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>__TITLE_PLAIN__</title>
<style>
  /* ============================================================
     TRIVIA FIELD GUIDE — self-contained, no external assets,
     no browser storage. Opens cleanly inside the Claude app.
     Theme: a topographic survey field guide. The one signature
     element is the benchmark medallion that carries each number;
     everything else stays quiet so the questions read first.
     ============================================================ */

  :root{
    /* Palette — drafting paper + contour bistre, survey-blue focus.
       Deliberately leans sepia/olive (a map), not the cream+terracotta default. */
    --paper:#f1efe6;
    --card:#fbfaf4;
    --ink:#2a2823;
    --ink-2:#574f43;
    --muted:#8c8475;
    --contour:#8a5a2b;     /* benchmark/contour bistre — the one bold hue */
    --olive:#5d6b4a;       /* used only for the "revealed" state */
    --line:rgba(42,40,35,.14);
    --line-soft:rgba(42,40,35,.08);
    --focus:#2f6db0;       /* survey water-blue, high contrast */

    /* Type roles, all from system fonts so the file is fully offline.
       Serif = almanac/guidebook voice (display + questions).
       Sans  = maximum legibility (answers, UI).
       Mono  = survey readout (numbers, small labels). */
    --serif:"Iowan Old Style","Palatino Linotype",Palatino,Georgia,"Times New Roman",serif;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,system-ui,sans-serif;
    --mono:ui-monospace,"SF Mono",SFMono-Regular,Menlo,Consolas,"Roboto Mono",monospace;

    --maxw:640px;
    --pad:clamp(16px,5vw,28px);
    --radius:14px;
  }

  @media (prefers-color-scheme: dark){
    :root{
      --paper:#1b1a17;
      --card:#24231e;
      --ink:#ece7da;
      --ink-2:#bdb6a6;
      --muted:#8e8676;
      --contour:#cca067;
      --olive:#9bb07e;
      --line:rgba(236,231,218,.16);
      --line-soft:rgba(236,231,218,.08);
      --focus:#7cb3e8;
    }
  }

  *{box-sizing:border-box}
  html{-webkit-text-size-adjust:100%}
  body{
    margin:0;
    background:var(--paper);
    color:var(--ink);
    font-family:var(--sans);
    font-size:17px;
    line-height:1.55;
    -webkit-font-smoothing:antialiased;
    text-rendering:optimizeLegibility;
  }

  .wrap{
    max-width:var(--maxw);
    margin:0 auto;
    padding:0 var(--pad) calc(64px + env(safe-area-inset-bottom));
  }

  /* ---- Masthead ---- */
  header{
    padding:clamp(28px,8vw,52px) 0 18px;
    border-bottom:1px solid var(--line);
  }
  .eyebrow{
    font-family:var(--mono);
    font-size:.72rem;
    letter-spacing:.16em;
    text-transform:uppercase;
    color:var(--contour);
    margin:0 0 12px;
  }
  h1{
    font-family:var(--serif);
    font-weight:600;
    font-size:clamp(1.9rem,8vw,2.7rem);
    line-height:1.08;
    letter-spacing:-.01em;
    margin:0 0 .5rem;
  }
  h1 .num{color:var(--contour);font-style:italic}
  .dek{
    color:var(--ink-2);
    font-size:1.02rem;
    margin:.35rem 0 0;
    max-width:46ch;
  }

  /* ---- Control bar (sticky) ---- */
  .controls{
    position:sticky;
    top:0;
    z-index:5;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
    padding:12px 0;
    margin:0 0 8px;
    background:color-mix(in srgb, var(--paper) 88%, transparent);
    backdrop-filter:saturate(1.2) blur(8px);
    border-bottom:1px solid var(--line-soft);
  }
  .count{
    font-family:var(--mono);
    font-size:.82rem;
    color:var(--muted);
    letter-spacing:.02em;
  }
  .count b{color:var(--ink);font-weight:600}
  .toggle-all{
    appearance:none;
    border:1px solid var(--line);
    background:var(--card);
    color:var(--ink);
    font:inherit;
    font-size:.86rem;
    font-weight:600;
    min-height:44px;
    padding:0 16px;
    border-radius:999px;
    cursor:pointer;
  }
  .toggle-all:active{transform:translateY(1px)}

  /* ---- Question cards ---- */
  ol.deck{list-style:none;margin:0;padding:8px 0 0}
  .card{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:var(--radius);
    margin:0 0 14px;
    overflow:hidden;
    box-shadow:0 1px 0 var(--line-soft);
  }

  /* The whole question is the reveal control — a big, obvious tap target. */
  .q-toggle{
    appearance:none;
    -webkit-tap-highlight-color:transparent;
    width:100%;
    display:grid;
    grid-template-columns:auto 1fr;
    gap:14px;
    align-items:start;
    text-align:left;
    background:none;
    border:0;
    color:inherit;
    font:inherit;
    padding:18px;
    cursor:pointer;
  }

  /* Signature element: a survey benchmark medallion. */
  .medallion{
    position:relative;
    width:40px;height:40px;
    flex:none;
    border-radius:50%;
    border:1.5px solid var(--contour);
    display:grid;place-items:center;
    font-family:var(--mono);
    font-size:.95rem;
    font-weight:600;
    color:var(--contour);
    margin-top:2px;
  }
  .medallion::before,
  .medallion::after{
    content:"";position:absolute;background:var(--contour);opacity:.55;
  }
  .medallion::before{width:1px;height:6px;top:-4px;left:50%;transform:translateX(-50%)}
  .medallion::after{width:6px;height:1px;left:-4px;top:50%;transform:translateY(-50%)}

  .q-main{min-width:0}
  .cat{
    font-family:var(--mono);
    font-size:.68rem;
    letter-spacing:.12em;
    text-transform:uppercase;
    color:var(--muted);
    display:block;
    margin:2px 0 7px;
  }
  .q-text{
    font-family:var(--serif);
    font-size:1.14rem;
    line-height:1.42;
    color:var(--ink);
  }
  .hint{
    display:inline-flex;
    align-items:center;
    gap:7px;
    margin-top:12px;
    font-family:var(--mono);
    font-size:.74rem;
    letter-spacing:.04em;
    color:var(--contour);
  }
  .chev{
    width:9px;height:9px;
    border-right:1.5px solid currentColor;
    border-bottom:1.5px solid currentColor;
    transform:rotate(45deg);
    transition:transform .25s ease;
  }
  .card.is-open .hint{color:var(--olive)}
  .card.is-open .chev{transform:rotate(-135deg)}
  .card.is-open .medallion{background:var(--olive);border-color:var(--olive);color:var(--card)}
  .card.is-open .medallion::before,
  .card.is-open .medallion::after{background:var(--olive)}

  /* Animated disclosure via the grid-rows technique (smooth, robust). */
  .answer{
    display:grid;
    grid-template-rows:0fr;
    transition:grid-template-rows .28s ease;
  }
  .card.is-open .answer{grid-template-rows:1fr}
  .answer-inner{overflow:hidden}
  .answer-pad{
    padding:2px 18px 20px 18px;
    border-top:1px solid var(--line-soft);
    margin-top:2px;
  }

  .label{
    font-family:var(--mono);
    font-size:.66rem;
    letter-spacing:.14em;
    text-transform:uppercase;
    color:var(--muted);
    display:block;
    margin:16px 0 5px;
  }
  .answer-pad .label:first-child{margin-top:14px}

  .ans-main{
    font-family:var(--serif);
    font-size:1.22rem;
    font-weight:600;
    line-height:1.3;
    color:var(--ink);
  }
  .ans-detail{
    display:block;
    margin-top:3px;
    color:var(--ink-2);
    font-size:1rem;
    line-height:1.5;
  }
  .field p{
    margin:0;
    color:var(--ink-2);
    font-size:1rem;
    line-height:1.6;
  }
  .field .source-text{
    font-size:.92rem;
    color:var(--muted);
    line-height:1.55;
  }

  /* Accessibility floor */
  .q-toggle:focus-visible,
  .toggle-all:focus-visible{
    outline:3px solid var(--focus);
    outline-offset:2px;
    border-radius:12px;
  }
  @media (prefers-reduced-motion: reduce){
    .answer{transition:none}
    .chev{transition:none}
  }

  footer{
    margin-top:28px;
    padding-top:18px;
    border-top:1px solid var(--line);
    font-family:var(--mono);
    font-size:.74rem;
    letter-spacing:.02em;
    color:var(--muted);
    line-height:1.7;
  }
  footer a{color:var(--contour)}

  .empty{
    color:var(--muted);
    font-family:var(--mono);
    font-size:.85rem;
    padding:32px 0;
  }
</style>
</head>
<body>
  <div class="wrap">
    <header>
      <p class="eyebrow">__EYEBROW__</p>
      <h1>__TITLE_HTML__</h1>
      <p class="dek">__DEK__</p>
    </header>

    <div class="controls">
      <span class="count"><b id="revealed">0</b> of <span id="total">0</span> revealed</span>
      <button class="toggle-all" id="toggleAll" type="button">Reveal all</button>
    </div>

    <ol class="deck" id="deck"></ol>

    <footer>__FOOTER_HTML__</footer>
  </div>

<script>
  /* The renderer replaces the marker below with comma-separated question
     objects. Each object: { cat, q, state, detail, why, more, source }.
     Left empty, the page shows a gentle empty state instead of crashing. */
  const QUESTIONS = [
    /*__QUESTIONS__*/
  ];

  const deck = document.getElementById('deck');
  const revealedEl = document.getElementById('revealed');
  const totalEl = document.getElementById('total');
  const toggleAllBtn = document.getElementById('toggleAll');

  // textContent everywhere — apostrophes, em-dashes, °, & are all safe.
  function setText(el, text){ el.textContent = (text == null ? '' : String(text)); }

  function buildCard(item, i){
    const li = document.createElement('li');
    li.className = 'card';

    const btn = document.createElement('button');
    btn.className = 'q-toggle';
    btn.type = 'button';
    btn.setAttribute('aria-expanded', 'false');
    const ansId = 'ans-' + i;
    btn.setAttribute('aria-controls', ansId);

    const med = document.createElement('span');
    med.className = 'medallion';
    med.setAttribute('aria-hidden', 'true');
    setText(med, i + 1);

    const main = document.createElement('span');
    main.className = 'q-main';
    if (item.cat){
      const cat = document.createElement('span');
      cat.className = 'cat';
      setText(cat, item.cat);
      main.appendChild(cat);
    }
    const q = document.createElement('span');
    q.className = 'q-text';
    setText(q, item.q);
    main.appendChild(q);

    const hint = document.createElement('span');
    hint.className = 'hint';
    const hintLabel = document.createElement('span');
    hintLabel.className = 'hint-label';
    setText(hintLabel, 'Tap to reveal');
    const chev = document.createElement('span');
    chev.className = 'chev';
    chev.setAttribute('aria-hidden', 'true');
    hint.appendChild(hintLabel);
    hint.appendChild(chev);
    main.appendChild(hint);

    btn.appendChild(med);
    btn.appendChild(main);

    // Answer region
    const ans = document.createElement('div');
    ans.className = 'answer';
    ans.id = ansId;
    ans.setAttribute('role', 'region');
    ans.setAttribute('aria-hidden', 'true');

    const inner = document.createElement('div');
    inner.className = 'answer-inner';
    const pad = document.createElement('div');
    pad.className = 'answer-pad';

    // Answer (state + detail)
    pad.appendChild(makeLabel('Answer'));
    const aMain = document.createElement('span');
    aMain.className = 'ans-main';
    setText(aMain, item.state);
    pad.appendChild(aMain);
    if (item.detail){
      const aDet = document.createElement('span');
      aDet.className = 'ans-detail';
      setText(aDet, item.detail);
      pad.appendChild(aDet);
    }

    if (item.why) pad.appendChild(makeField('Why it\u2019s interesting', item.why));
    if (item.more) pad.appendChild(makeField('Follow-on', item.more));
    if (item.source) pad.appendChild(makeField('Source', item.source, true));

    inner.appendChild(pad);
    ans.appendChild(inner);

    btn.addEventListener('click', function(){ toggle(li, btn, ans, hintLabel); });

    li.appendChild(btn);
    li.appendChild(ans);
    return li;
  }

  function makeLabel(text){
    const l = document.createElement('span');
    l.className = 'label';
    setText(l, text);
    return l;
  }

  function makeField(labelText, body, isSource){
    const frag = document.createDocumentFragment();
    frag.appendChild(makeLabel(labelText));
    const wrap = document.createElement('div');
    wrap.className = 'field';
    const p = document.createElement('p');
    if (isSource) p.className = 'source-text';
    setText(p, body);
    wrap.appendChild(p);
    frag.appendChild(wrap);
    return frag;
  }

  function toggle(li, btn, ans, hintLabel){
    const open = li.classList.toggle('is-open');
    btn.setAttribute('aria-expanded', open ? 'true' : 'false');
    ans.setAttribute('aria-hidden', open ? 'false' : 'true');
    setText(hintLabel, open ? 'Hide answer' : 'Tap to reveal');
    updateCount();
  }

  function updateCount(){
    const cards = deck.querySelectorAll('.card');
    const open = deck.querySelectorAll('.card.is-open').length;
    setText(revealedEl, open);
    const allOpen = cards.length > 0 && open === cards.length;
    setText(toggleAllBtn, allOpen ? 'Hide all' : 'Reveal all');
  }

  toggleAllBtn.addEventListener('click', function(){
    const cards = Array.prototype.slice.call(deck.querySelectorAll('.card'));
    const allOpen = cards.length > 0 && cards.every(c => c.classList.contains('is-open'));
    cards.forEach(function(li){
      const btn = li.querySelector('.q-toggle');
      const ans = li.querySelector('.answer');
      const hintLabel = li.querySelector('.hint-label');
      const shouldOpen = !allOpen;
      li.classList.toggle('is-open', shouldOpen);
      btn.setAttribute('aria-expanded', shouldOpen ? 'true' : 'false');
      ans.setAttribute('aria-hidden', shouldOpen ? 'false' : 'true');
      setText(hintLabel, shouldOpen ? 'Hide answer' : 'Tap to reveal');
    });
    updateCount();
  });

  function render(){
    if (!Array.isArray(QUESTIONS) || QUESTIONS.length === 0){
      const p = document.createElement('p');
      p.className = 'empty';
      setText(p, 'No questions loaded.');
      deck.appendChild(p);
      setText(totalEl, 0);
      return;
    }
    const frag = document.createDocumentFragment();
    QUESTIONS.forEach(function(item, i){ frag.appendChild(buildCard(item, i)); });
    deck.appendChild(frag);
    setText(totalEl, QUESTIONS.length);
    updateCount();
  }

  render();
</script>
</body>
</html>
