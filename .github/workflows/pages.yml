name: Deploy trivia site to GitHub Pages

# Renders every library/sets/*.json into a self-contained, mobile-first site
# and publishes it to GitHub Pages. Nothing rendered is committed — the site is
# built fresh from the set files (the source of truth) on each push to main.

on:
  push:
    branches: [main]
    paths:
      - "library/sets/**"
      - "scripts/**"
      - ".claude/skills/trivia-generator/assets/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

# Least privilege for the GITHUB_TOKEN, plus the Pages deploy permissions.
permissions:
  contents: read
  pages: write
  id-token: write

# One in-flight Pages deploy at a time; don't cancel a publish midway.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Build site
        run: python scripts/build_site.py --out site
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
